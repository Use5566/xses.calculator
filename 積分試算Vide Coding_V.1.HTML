<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新市國小教師職級務積分試算</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    color: #333;
    line-height: 1.5;
    padding: 10px;
  }
  .container {
    max-width: 850px;
    margin: 0 auto;
    background: #fff;
    padding: 20px 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 15px;
    font-size: 1.6em;
  }
  .instruction {
    background: #eef5f9;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 0.9em;
    color: #475569;
  }
  
  /* 學年區塊樣式 */
  .year-block {
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 12px 15px;
    margin-bottom: 12px;
    background-color: #fafbfc;
    transition: box-shadow 0.2s;
  }
  .year-block:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .year-label {
    font-weight: bold;
    font-size: 1.05em;
    color: #1e293b;
    margin-bottom: 8px;
    border-left: 4px solid #3498db;
    padding-left: 8px;
  }

  /* 按鈕群組共用樣式 */
  .button-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .button-group input[type="radio"] {
    display: none;
  }
  .choice-btn {
    display: inline-block;
    padding: 6px 14px;
    background-color: #fff;
    border: 1px solid #cbd5e1;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9em;
    color: #475569;
    transition: all 0.2s ease-in-out;
    user-select: none;
  }
  .choice-btn:hover {
    background-color: #f1f5f9;
    border-color: #94a3b8;
  }
  
  /* 職務按鈕選中狀態 */
  .role-group input[type="radio"]:checked + .choice-btn {
    background-color: #3498db;
    color: #fff;
    border-color: #2980b9;
    box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3);
  }

  /* 年級按鈕區塊 */
  .grade-container {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    background-color: #fffaf0;
    border: 1px dashed #f6ad55;
    border-radius: 6px;
  }
  .grade-title {
    font-size: 0.85em;
    color: #dd6b20;
    font-weight: bold;
    margin-bottom: 0;
  }
  .grade-group input[type="radio"]:checked + .choice-btn {
    background-color: #ed8936;
    color: #fff;
    border-color: #dd6b20;
    box-shadow: 0 2px 5px rgba(237, 137, 54, 0.3);
  }

  /* 計算按鈕與結果區塊 */
  button.submit-btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background-color: #27ae60;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 1.1em;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button.submit-btn:hover {
    background-color: #219653;
  }
  #result-container {
    display: none;
    margin-top: 25px;
    padding: 20px;
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    border-radius: 6px;
    color: #065f46;
  }
  .total-score {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
  }
  .breakdown {
    font-size: 0.95em;
    line-height: 1.6;
  }
  .breakdown ul {
    margin-top: 8px;
    padding-left: 20px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>新北市新市國小職級務積分試算系統</h1>
  <div class="instruction">
    <strong>📌 填寫說明：</strong><br>
    1. 請由「114 學年」開始，直接<strong>點擊方塊</strong>選擇過去 6 個學年的職務。<br>
    2. 若您點選「導師」，下方會自動展開年級選項，系統將依此自動判斷是否連續。<br>
    3. 導師擔任後母班時，請勾選右上角<strong>「本學年為後母班」</strong>，系統會自動採計您前學年的職務以補足最高分。<br>
    4. <strong>本系統不含114.4.30提案之說明二，配合舊制輪動視為連續教學之積分。</strong>
  </div>

  <div id="form-container">
    </div>

  <button class="submit-btn" onclick="calculatePoints()">開始計算積分</button>

  <div id="result-container">
    <div class="total-score">總積分：<span id="final-score">0</span> 分</div>
    <hr style="border-top:1px solid #a7f3d0; margin: 15px 0;">
    <div class="breakdown" id="score-breakdown"></div>
  </div>
</div>

<script>
  // 起始學年與計算年份
  const startYear = 114;
  const yearsCount = 6;

  // 職務選項清單
  const roleOptions = [
    { value: 'admin', text: '行政職' },
    { value: 'homeroom', text: '導師' },
    { value: 'subject', text: '科任 (含多元/專輔/留停晉級)' },
    { value: 'secondment', text: '商借及調用' },
    { value: 'leave', text: '留職停薪 (無晉級)' }
  ];

  // 年級選項清單
  const gradeOptions = [
    { value: '1', text: '一年級' },
    { value: '2', text: '二年級' },
    { value: '3', text: '三年級' },
    { value: '4', text: '四年級' },
    { value: '5', text: '五年級' },
    { value: '6', text: '六年級' },
    { value: 'special', text: '特教班/幼兒園' }
  ];

  // 動態產生表單區塊
  const formContainer = document.getElementById('form-container');
  
  for (let i = 0; i < yearsCount; i++) {
    let year = startYear - i;
    
    // 建立學年外框
    let yearBlock = document.createElement('div');
    yearBlock.className = 'year-block';
    
    // 學年標題
    let title = document.createElement('div');
    title.className = 'year-label';
    title.innerText = `${year} 學年`;
    yearBlock.appendChild(title);
    
    // 職務按鈕群組
    let roleGroup = document.createElement('div');
    roleGroup.className = 'button-group role-group';
    
    roleOptions.forEach(opt => {
      let radioId = `role_${year}_${opt.value}`;
      
      let radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `role${year}`;
      radio.id = radioId;
      radio.value = opt.value;
      radio.onchange = () => toggleGrade(year);
      
      let label = document.createElement('label');
      label.className = 'choice-btn';
      label.setAttribute('for', radioId);
      label.innerText = opt.text;
      
      roleGroup.appendChild(radio);
      roleGroup.appendChild(label);
    });
    yearBlock.appendChild(roleGroup);

    // 年級按鈕區塊 (預設隱藏)
    let gradeContainer = document.createElement('div');
    gradeContainer.className = 'grade-container';
    gradeContainer.id = `grade-container-${year}`;
    
    // 年級區塊標題 ＆ 後母班勾選框 (排在同一行)
    let gradeHeader = document.createElement('div');
    gradeHeader.style.display = 'flex';
    gradeHeader.style.justifyContent = 'space-between';
    gradeHeader.style.alignItems = 'center';
    gradeHeader.style.marginBottom = '8px';

    let gradeTitle = document.createElement('div');
    gradeTitle.className = 'grade-title';
    gradeTitle.innerText = `👉 請選擇 ${year} 學年擔任的年級：`;
    
    // 後母班 Checkbox
    let stepmotherLabel = document.createElement('label');
    stepmotherLabel.style.fontSize = '0.9em';
    stepmotherLabel.style.color = '#c53030';
    stepmotherLabel.style.fontWeight = 'bold';
    stepmotherLabel.style.cursor = 'pointer';
    stepmotherLabel.style.userSelect = 'none';
    
    let stepmotherCheckbox = document.createElement('input');
    stepmotherCheckbox.type = 'checkbox';
    stepmotherCheckbox.id = `stepmother_${year}`;
    stepmotherCheckbox.style.marginRight = '5px';
    stepmotherCheckbox.style.cursor = 'pointer';
    
    stepmotherLabel.appendChild(stepmotherCheckbox);
    stepmotherLabel.appendChild(document.createTextNode('本學年為後母班'));
    
    gradeHeader.appendChild(gradeTitle);
    gradeHeader.appendChild(stepmotherLabel);
    gradeContainer.appendChild(gradeHeader);

    // 年級按鈕群組
    let gradeGroup = document.createElement('div');
    gradeGroup.className = 'button-group grade-group';
    
    gradeOptions.forEach(opt => {
      let radioId = `grade_${year}_${opt.value}`;
      
      let radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `grade${year}`;
      radio.id = radioId;
      radio.value = opt.value;
      
      let label = document.createElement('label');
      label.className = 'choice-btn';
      label.setAttribute('for', radioId);
      label.innerText = opt.text;
      
      gradeGroup.appendChild(radio);
      gradeGroup.appendChild(label);
    });
    gradeContainer.appendChild(gradeGroup);
    yearBlock.appendChild(gradeContainer);
    
    formContainer.appendChild(yearBlock);
  }

  // 顯示或隱藏年級選單
  function toggleGrade(year) {
    const selectedRole = document.querySelector(`input[name="role${year}"]:checked`);
    const gradeContainer = document.getElementById(`grade-container-${year}`);
    
    if (selectedRole && selectedRole.value === 'homeroom') {
      gradeContainer.style.display = 'block';
    } else {
      gradeContainer.style.display = 'none';
      const gradeRadios = document.querySelectorAll(`input[name="grade${year}"]`);
      gradeRadios.forEach(r => r.checked = false);
      // 同時取消後母班勾選
      const stepmotherCheck = document.getElementById(`stepmother_${year}`);
      if(stepmotherCheck) stepmotherCheck.checked = false;
    }
  }

  function isHomeroomContinuous(newerGrade, olderGrade) {
    if (newerGrade === 'special' && olderGrade === 'special') return true;
    if (newerGrade === 'special' || olderGrade === 'special') return false;

    let nG = parseInt(newerGrade);
    let oG = parseInt(olderGrade);

    if (nG === oG + 1) return true;
    if (oG === 6 && nG === 1) return true;

    return false;
  }

  // 核心計算邏輯
  function calculatePoints() {
    const ptsMap = {
      'admin': [2, 6, 8, 9, 4, 2],
      'homeroom': [2, 3, 5, 8, 4, 2],
      'subject': [1, 2, 4, 6, 3, 1],
      'secondment': [1, 3, 4, 4.5, 2, 1],
      'leave': [0, 0, 0, 0, 0, 0]
    };

    let totalPoints = 0;
    let streakLength = 0;
    let breakdownLines = [];

    // 防呆檢查：由近期檢查到遠期
    for (let i = 0; i < yearsCount; i++) {
      let year = startYear - i;
      const roleElement = document.querySelector(`input[name="role${year}"]:checked`);
      if (!roleElement) {
        alert(`⚠️ 請確認「${year} 學年」的職務已點選！`);
        return;
      }
      if (roleElement.value === 'homeroom') {
        const gradeElement = document.querySelector(`input[name="grade${year}"]:checked`);
        if (!gradeElement) {
          alert(`⚠️ 您點選了導師，請確認下方「${year} 學年」的年級已點選！`);
          return;
        }
      }
    }

    // 紀錄「實際計分」所使用的軌道
    let previousEffectiveRole = null;

    // 正向計算：由最舊的學年 (109) 算到最新的學年 (114)
    for (let i = yearsCount - 1; i >= 0; i--) {
      let year = startYear - i;
      
      const role = document.querySelector(`input[name="role${year}"]:checked`).value;
      const gradeElement = document.querySelector(`input[name="grade${year}"]:checked`);
      const grade = role === 'homeroom' ? gradeElement?.value : null;
      const isStepmother = document.getElementById(`stepmother_${year}`)?.checked;

      let isContinuous = false;
      let effectiveRole = role; // 預設使用當下選擇的職務計分

      if (i === yearsCount - 1) {
        // 第一筆資料 (最舊的年份)
        streakLength = 0;
        isContinuous = true;
      } else {
        // 比較與「前一學年 (較舊)」的關聯性
        let olderYear = year - 1;
        let olderRole = document.querySelector(`input[name="role${olderYear}"]:checked`).value;
        let olderGradeElement = document.querySelector(`input[name="grade${olderYear}"]:checked`);
        let olderGrade = olderGradeElement ? olderGradeElement.value : null;

        let isSameTrack = false;
        
        if (role === olderRole) {
          isSameTrack = true;
        } else if ((role === 'admin' || role === 'secondment') && (olderRole === 'admin' || olderRole === 'secondment')) {
          isSameTrack = true; // 行政與商借互通
        }

        // 後母班補分機制判斷
        if (isStepmother && role === 'homeroom' && previousEffectiveRole) {
          // 比較「繼承前一軌道」與「重新起算」哪個分數高，保障當事人最大權益
          let inheritedPts = ptsMap[previousEffectiveRole][streakLength] !== undefined ? ptsMap[previousEffectiveRole][streakLength] : 0;
          let restartedPts = ptsMap[role][0]; // 導師第一年是 2 分

          if (inheritedPts >= restartedPts) {
            isContinuous = true;
            effectiveRole = previousEffectiveRole; // 繼承前一年的計分軌道
          } else {
            // 如果繼承的分數反而比較低，直接視為重新起算
            isContinuous = false;
            effectiveRole = role;
          }
        } else if (isSameTrack) {
          if (role === 'admin' || role === 'secondment' || role === 'subject' || role === 'leave') {
            isContinuous = true;
          } else if (role === 'homeroom') {
            isContinuous = isHomeroomContinuous(grade, olderGrade);
          }
        }
      }

      // 產生顯示名稱與補分標示
      let displayRoleName = roleOptions.find(opt => opt.value === role).text.split(' ')[0];
      if (role === 'homeroom') {
        let gradeText = gradeOptions.find(opt => opt.value === grade).text;
        displayRoleName += ` (${gradeText})`;
        
        if (isStepmother && effectiveRole !== role) {
          let effRoleText = roleOptions.find(opt => opt.value === effectiveRole).text.split(' ')[0];
          displayRoleName += ` <span style="color:#e53e3e; font-weight:bold;">[補分：接續${effRoleText}]</span>`;
        } else if (isStepmother) {
           displayRoleName += ` <span style="color:#e53e3e; font-weight:bold;">[後母班]</span>`;
        }
      }

      // 計算分數
      if (isContinuous) {
        let pts = ptsMap[effectiveRole][streakLength] !== undefined ? ptsMap[effectiveRole][streakLength] : 0;
        totalPoints += pts;
        breakdownLines.unshift(`<li>${year} 學年：${displayRoleName} (連續第 ${streakLength + 1} 年) 獲得 <strong>${pts}</strong> 分</li>`);
        streakLength++;
      } else {
        streakLength = 0;
        let pts = ptsMap[effectiveRole][streakLength] !== undefined ? ptsMap[effectiveRole][streakLength] : 0;
        totalPoints += pts;
        breakdownLines.unshift(`<li>${year} 學年：${displayRoleName} (重新起算) 獲得 <strong>${pts}</strong> 分</li>`);
        streakLength++;
      }
      
      // 更新記錄，留給下一年參考
      previousEffectiveRole = effectiveRole;
    }

    let breakdownHTML = "<strong>各學年得分明細（由近期回溯）：</strong><ul>" + breakdownLines.join('') + "</ul>";
    
    document.getElementById('final-score').innerText = totalPoints;
    document.getElementById('score-breakdown').innerHTML = breakdownHTML;
    document.getElementById('result-container').style.display = 'block';
    
    document.getElementById('result-container').scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
